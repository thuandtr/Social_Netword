services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: auth_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: test#1
      MYSQL_DATABASE: test
      MYSQL_USER: app_user
      MYSQL_PASSWORD: test#1
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - auth_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: auth_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - auth_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 5s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auth_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: test#1
      MYSQL_DATABASE: test
      JWT_SECRET: thisIsASecretKeyForJWTTokenGeneration
      ENCRYPTION_KEY: MyUOtSUaX0XH2jJtRV/DDfD5Ly78/Xau22/p06MKPCU=
      ENCRYPTION_IV: 1234567890123456
      COOKIE_SECRET: thisIsASecretKeyForCookie
      FRONTEND_URL: http://localhost:3000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auth_network

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: auth_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PROD_BACKEND_URL: http://backend:5000/api/v1/auth
      LOCAL_BACKEND_URL: http://backend:5000/api/v1/auth
    depends_on:
      - backend
    networks:
      - auth_network

volumes:
  mysql_data:
  redis_data:

networks:
  auth_network:
    driver: bridge
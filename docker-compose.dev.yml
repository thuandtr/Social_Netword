services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: auth_mysql_dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: test#1
      MYSQL_DATABASE: test
      MYSQL_USER: app_user
      MYSQL_PASSWORD: test#1
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - auth_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptest#1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: auth_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - auth_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Backend API - Development Mode with Hot Reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      target: development
    container_name: auth_backend_dev
    restart: unless-stopped
    ports:
      - "5000:5000"
      - "9229:9229"  # Debugging port
    environment:
      NODE_ENV: development
      PORT: 5000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: test#1
      MYSQL_DATABASE: test
      JWT_SECRET: thisIsASecretKeyForJWTTokenGeneration
      ENCRYPTION_KEY: MyUOtSUaX0XH2jJtRV/DDfD5Ly78/Xau22/p06MKPCU=
      ENCRYPTION_IV: 1234567890123456
      COOKIE_SECRET: thisIsASecretKeyForCookie
      FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1/auth
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # Google OAuth (optional)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:5000/api/v1/auth/google/callback}
    volumes:
      # Mount source code for hot reload (read-only for security)
      - ./backend/src:/app/src:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/package-lock.json:/app/package-lock.json:ro
      # Uploads directory (read-write)
      - ./backend/uploads:/app/uploads
      # Use named volume for node_modules to avoid host/container conflicts
      - backend_node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - auth_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/v1/auth/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    # Enable interactive terminal for debugging
    stdin_open: true
    tty: true

  # Frontend Application - Development Mode with Hot Reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      target: development
    container_name: auth_frontend_dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      # Client-side API URL (browser requests)
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1/auth
      # Server-side API URL (Next.js server requests) - use Docker service name
      PROD_BACKEND_URL: http://backend:5000/api/v1/auth
      LOCAL_BACKEND_URL: http://backend:5000/api/v1/auth
      # Enable Next.js Fast Refresh and polling for Docker
      WATCHPACK_POLLING: true
      CHOKIDAR_USEPOLLING: true
    volumes:
      # Mount source code for hot reload (read-only for security)
      - ./frontend/app:/app/app:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/next.config.ts:/app/next.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/package.json:/app/package.json:ro
      - ./frontend/package-lock.json:/app/package-lock.json:ro
      - ./frontend/middleware.ts:/app/middleware.ts:ro
      - ./frontend/postcss.config.mjs:/app/postcss.config.mjs:ro
      # Use named volumes for node_modules and .next to avoid conflicts
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - auth_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    # Enable interactive terminal for debugging
    stdin_open: true
    tty: true

volumes:
  mysql_data_dev:
    driver: local
  redis_data_dev:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_next:
    driver: local

networks:
  auth_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
